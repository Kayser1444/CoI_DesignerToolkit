<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoI Blueprint Decoder</title>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<link rel="stylesheet" href="blueprint-decoder.css">
</head>
<body>

<header>
  <h1>CoI Blueprint Decoder</h1>
  <span>Paste a blueprint string on the left — decoded output appears on the right.</span>
  <button id="load-test" style="margin-left:auto;background:#2d3035;color:#d4cfc7;border:1px solid #3a3d42;border-radius:3px;padding:3px 10px;font-size:11px;cursor:pointer">Load test</button>
</header>

<div class="workspace">

  <!-- LEFT: input -->
  <div class="pane">
    <div class="pane-header">
      Blueprint string
      <span id="input-badge" class="badge"></span>
    </div>
    <textarea id="input" placeholder="B1234:SGVsbG8gV29ybGQ...&#10;&#10;Paste a Captain of Industry blueprint or folder string here." spellcheck="false"></textarea>
  </div>

  <!-- RIGHT: output -->
  <div class="pane">
    <div class="pane-header">
      Decoded
      <span id="output-badge" class="badge"></span>
    </div>
    <div class="output-area" id="output-area">
      <div class="empty">Waiting for input&hellip;</div>
    </div>
  </div>

</div>

<script src="blueprint-decoder.js"></script>
<script>
  const TEST_BLUEPRINT = 'B520:H4sIAAAAAAAACn2RMU7DMBiFX1w3daMUPETCbB2DZFVly+AFNUIZMnToBaoqAyhqqjRUysgxEMfgIByHAYRw/pZOjb3F+fze/97PveF8lszm74zdLF7qQztd1evtflfVzX4aP5br5m6AW8avzteLqqzq15/vr+thdL582GyK7fHX7+fbhw/PHy/rqqmadleMrjqdRbU9FG1Vr+7BRGBfPhebpqrbCRg8gOUcGWfj0fKpLNf1fuDZL370+Zcc2ZcThiMOZGBji+EiZlUtyTLBcoEOE32YlWNZyPKQsLAXs4K5RCbJVLqwVMJIbjHTj1lTE/KUTE2vaZc05TCc1JyFpIABYb2FdLMlElr6FtPO2XToJzSb7p2t09PCT6he3VtvN1vCoTmZOiMkgAZhzgixhJLCYsoZQYUipgjKudNIAjKwGJxqCIOI1OAsxAieUiGmt5AOU0LEhCknBhFEhMFZb8yhOBVyud4TFnGAU1LnFmJAgdQub+GERbCH1I7nD4xjnhFKBAAA';
  document.getElementById('load-test').addEventListener('click', function() {
    const ta = document.getElementById('input');
    ta.value = TEST_BLUEPRINT;
    ta.dispatchEvent(new Event('input'));
  });
</script>
</body>
</html>
