<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoI Blueprint Decoder</title>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root {
  --bg:        #1a1c1e;
  --panel:     #23262a;
  --border:    #3a3d42;
  --accent:    #c8a84b;
  --text:      #d4cfc7;
  --muted:     #7a7672;
  --danger:    #c0392b;
  --ok:        #4caf50;
  --mono:      'Consolas', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 { font-size: 15px; color: var(--accent); font-weight: 600; }
header span { color: var(--muted); font-size: 12px; }

.workspace {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  overflow: hidden;
}

.pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.pane:last-child { border-right: none; }

.pane-header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.pane-header .badge {
  background: #2d3035;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-size: 10px;
  color: var(--text);
  font-weight: normal;
  letter-spacing: 0;
  text-transform: none;
}
.pane-header .badge.ok  { border-color: var(--ok);    color: var(--ok); }
.pane-header .badge.err { border-color: var(--danger); color: var(--danger); }

textarea {
  flex: 1;
  background: transparent;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  border: none;
  outline: none;
  resize: none;
  padding: 12px;
  line-height: 1.5;
}
textarea::placeholder { color: var(--muted); }

.output-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.info-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
}
.info-chip {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 11px;
}
.info-chip .label { color: var(--muted); }
.info-chip .value { color: var(--accent); font-weight: 600; margin-left: 4px; }

.tabs { display: flex; gap: 2px; margin-bottom: 10px; }
.tab {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 3px 3px 0 0;
  padding: 4px 12px;
  cursor: pointer;
  font-size: 11px;
  color: var(--muted);
  user-select: none;
  border-bottom: none;
}
.tab.active { background: var(--bg); color: var(--text); border-bottom: 1px solid var(--bg); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.strings-list {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
}
.str-item {
  display: flex;
  gap: 10px;
  padding: 1px 0;
  border-bottom: 1px solid #2a2c30;
}
.str-item:last-child { border-bottom: none; }
.str-offset { color: var(--muted); min-width: 60px; }
.str-len    { color: #5a9fd4; min-width: 30px; text-align: right; }
.str-value  { color: var(--text); word-break: break-all; }
.str-value.long { color: var(--accent); }

.hex-dump {
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.7;
  white-space: pre;
  color: var(--text);
}
.hex-offset { color: var(--muted); }
.hex-ascii  { color: #5a9fd4; }

.empty {
  color: var(--muted);
  font-style: italic;
  padding: 20px 0;
  text-align: center;
}

.error-box {
  background: #2a1a1a;
  border: 1px solid var(--danger);
  border-radius: 4px;
  padding: 10px 12px;
  color: var(--danger);
  font-family: var(--mono);
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.entity-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
}
.entity-table th {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 4px 8px;
  text-align: left;
  color: var(--muted);
  font-weight: 600;
  font-size: 11px;
  white-space: nowrap;
}
.entity-table td {
  padding: 3px 8px;
  border-bottom: 1px solid #2a2c30;
}
.entity-table tr:last-child td { border-bottom: none; }
.entity-table tr:hover td { background: #22252a; }
.td-num   { color: #5a9fd4; text-align: right; white-space: nowrap; }
.td-proto { color: var(--accent); }
.td-mod   { color: var(--muted); font-size: 11px; }
.td-str   { color: var(--text); }
.td-ports { white-space: nowrap; letter-spacing: 2px; font-size: 13px; }
.pp-on    { color: #f0c040; cursor: default; }
.pp-off   { color: #404040; cursor: default; }

.parse-note {
  color: var(--muted);
  font-size: 11px;
  margin-top: 8px;
  font-style: italic;
}
</style>
</head>
<body>

<header>
  <h1>CoI Blueprint Decoder</h1>
  <span>Paste a blueprint string on the left — decoded output appears on the right.</span>
</header>

<div class="workspace">

  <!-- LEFT: input -->
  <div class="pane">
    <div class="pane-header">
      Blueprint string
      <span style="display:flex;align-items:center;gap:8px">
        <button id="load-test" style="background:#2d3035;color:#d4cfc7;border:1px solid #3a3d42;border-radius:3px;padding:3px 10px;font-size:11px;cursor:pointer">Load test</button>
        <span id="input-badge" class="badge"></span>
      </span>
    </div>
    <textarea id="input" placeholder="B1234:SGVsbG8gV29ybGQ...&#10;&#10;Paste a Captain of Industry blueprint or folder string here." spellcheck="false"></textarea>
  </div>

  <!-- RIGHT: output -->
  <div class="pane">
    <div class="pane-header">
      Decoded
      <span id="output-badge" class="badge"></span>
    </div>
    <div class="output-area" id="output-area">
      <div class="empty">Waiting for input&hellip;</div>
    </div>
  </div>

</div>

<script src="blueprint-decoder.js"></script>

</body>
</html>
